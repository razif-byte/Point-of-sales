name: Deploy to NASADEF FTP

on:
  push:
    branches:
      - main  # Atau 'master' mengikut nama branch utama anda

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🔨 Build Project
        run: npm run build

      - name: 🚀 Sync Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # Jika folder aiapp.nasadef.com.my berada di subfolder tertentu (cth: public_html/aiapp), 
          # nyatakan di 'server-dir' di bawah:
          # server-dir: ./public_html/aiapp/
